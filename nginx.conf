worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log off;
    upstream fraud_backend {
        server fraud-api-1:9999;
        server fraud-api-2:9999;
        keepalive 32;
    }

    server {
        listen 9999;
        location / {
            proxy_pass http://fraud_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
